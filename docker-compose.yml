services:
  api:
    image: node:20-bookworm
    restart: unless-stopped
    working_dir: /workspace
    env_file:
      - .env
    environment:
      DATABASE_URL: file:./dev.db
      WEB_ORIGIN: http://localhost:3000
      API_PUBLIC_URL: http://localhost:4000
      NEXT_PUBLIC_API_URL: http://localhost:4000
      STORAGE_ROOT: /data/storage
    command: >
      bash -lc "npm install &&
      npm run prisma:generate -w apps/api &&
      npm run db:init -w apps/api &&
      npm run dev -w apps/api"
    ports:
      - "4000:4000"
    volumes:
      - ./:/workspace
      - api-node-modules:/workspace/node_modules
      - api-sqlite:/workspace/apps/api/prisma
      - document-storage:/data/storage

  web:
    image: node:20-bookworm
    restart: unless-stopped
    working_dir: /workspace
    depends_on:
      - api
    env_file:
      - .env
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:4000
    command: >
      bash -lc "npm install &&
      npm run dev -w apps/web -- --hostname 0.0.0.0"
    ports:
      - "3000:3000"
    volumes:
      - ./:/workspace
      - web-node-modules:/workspace/node_modules

volumes:
  api-node-modules:
  web-node-modules:
  api-sqlite:
  document-storage:
