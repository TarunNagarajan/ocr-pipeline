<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#6366f1"/>
      <stop offset="100%" stop-color="#8b5cf6"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" rx="96" fill="url(#bg)"/>
  <!-- Lens outer ring -->
  <circle cx="256" cy="256" r="140" fill="none" stroke="#fff" stroke-width="24" opacity="0.9"/>
  <!-- Lens inner -->
  <circle cx="256" cy="256" r="90" fill="#fff" opacity="0.15"/>
  <circle cx="256" cy="256" r="70" fill="none" stroke="#fff" stroke-width="8" opacity="0.8"/>
  <!-- Lens flare -->
  <circle cx="210" cy="210" r="20" fill="#fff" opacity="0.4"/>
  <circle cx="200" cy="200" r="8" fill="#fff" opacity="0.6"/>
  <!-- Document lines -->
  <line x1="200" y1="280" x2="312" y2="280" stroke="#fff" stroke-width="8" stroke-linecap="round" opacity="0.6"/>
  <line x1="200" y1="300" x2="280" y2="300" stroke="#fff" stroke-width="8" stroke-linecap="round" opacity="0.4"/>
  <line x1="200" y1="320" x2="260" y2="320" stroke="#fff" stroke-width="8" stroke-linecap="round" opacity="0.3"/>
  <!-- Scan line -->
  <line x1="160" y1="256" x2="352" y2="256" stroke="#fff" stroke-width="6" stroke-linecap="round" opacity="0.7">
    <animate attributeName="opacity" values="0.7;0.3;0.7" dur="2s" repeatCount="indefinite"/>
  </line>
</svg>
